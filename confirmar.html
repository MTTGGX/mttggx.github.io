<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GortSMP - Confirmar Compra</title>
<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: #fff;
}

/* Header */
header {
  padding: 40px 20px;
  text-align: center;
}
header h1 { font-size: 3em; color: #4fc3f7; margin:0; }
header p { font-size: 1.2em; opacity:0.9; }

/* Menu */
nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  background: rgba(0,0,0,0.4);
  padding: 15px;
}
nav a {
  color:#fff;
  text-decoration:none;
  font-weight:bold;
}
nav a:hover { color:#4fc3f7; }

/* Seção principal */
section {
  max-width: 600px;
  margin: 40px auto;
  padding: 30px;
  background: rgba(0,0,0,0.5);
  border-radius: 14px;
  box-shadow: 0 0 25px rgba(0,0,0,0.5);
}
section h2 { text-align:center; color:#4fc3f7; }

/* Form info */
.form-info {
  background: rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 10px;
  margin-top: 20px;
}
.form-info p { margin:10px 0; }
label { display:block; margin-top:15px; font-weight:bold; }
input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: none;
}

/* Botões */
button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}
.confirm-btn { background:#4fc3f7; color:black; }
.confirm-btn:hover { background:#81d4fa; }
.back-btn { background:#444; color:white; margin-top:10px; }
.back-btn:hover { background:#555; }

/* Footer */
footer { text-align:center; padding:20px; opacity:0.7; margin-top:20px; }
</style>
</head>
<body>

<header>
  <h1>GortSMP</h1>
  <p>Confirme seus dados para completar a compra</p>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="#sobre">Sobre</a>
  <a href="#loja">Loja</a>
  <a href="#como-entrar">Como Entrar</a>
</nav>

<section id="confirmacao">
  <h2>Confirmar Dados</h2>

  <div class="form-info">
    <p><strong>Nick:</strong> <span id="nick"></span></p>
    <p><strong>Email:</strong> <span id="email"></span></p>
    <p><strong>Número:</strong> <span id="numero"></span></p>
    <p><strong>Pagamento:</strong> <span id="pagamento"></span></p>

    <label id="captcha-label">Captcha:</label>
    <input type="text" id="captcha" placeholder="Digite a resposta">

    <button class="confirm-btn" onclick="verificar()">Confirmar Compra</button>
    <button class="back-btn" onclick="history.back()">Voltar</button>
  </div>
</section>

<footer>
  <p>© 2026 GortSMP • Todos os direitos reservados</p>
</footer>

<script>
// Recebe dados do formulário anterior
const params = new URLSearchParams(window.location.search);
document.getElementById("nick").textContent = params.get("nick");
document.getElementById("email").textContent = params.get("email");
document.getElementById("numero").textContent = params.get("numero");
document.getElementById("pagamento").textContent = params.get("pagamento");

// Captcha aleatório
let captchaResult = 0;
function gerarCaptcha(){
  const a = Math.floor(Math.random()*50)+1;
  const b = Math.floor(Math.random()*50)+1;
  captchaResult = a + b;
  document.getElementById("captcha-label").textContent = `Captcha: Quanto é ${a} + ${b}?`;
  document.getElementById("captcha").value = "";
}
gerarCaptcha();

// Verifica captcha
function verificar(){
  const resposta = parseInt(document.getElementById("captcha").value);
  if(resposta === captchaResult){
    alert("Compra enviada para a equipe do servidor!");
  } else {
    alert("Captcha incorreto! Um novo captcha foi gerado.");
    gerarCaptcha(); // troca captcha automaticamente
  }
}
</script>

</body>
</html>
