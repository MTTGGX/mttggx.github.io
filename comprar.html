<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Comprar VIP - GortSMP</title>

<style>
body{
  font-family: Arial;
  background:#0f2027;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:12px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  margin-top:15px;
  padding:10px;
  background:#4fc3f7;
  border:none;
  border-radius:6px;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="box">

<h2>Comprar VIP</h2>

<form>

<label>Nick do Minecraft</label>
<input type="text" placeholder="Seu nick" required>

<label>Email</label>
<input type="email" placeholder="Seu email" required>

<label>Número</label>
<input type="text" placeholder="Seu número">

<label>Pacote</label>
<input type="text" placeholder="VIP / VIP+ / MVP">

<button type="submit">Enviar</button>

</form>

</div>

</body>
</html>
